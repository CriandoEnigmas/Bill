<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>1 4 15 2 5</title>

<style>
  body {
    margin: 0;
    background: black; 
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: Arial, Helvetica, sans-serif;
    position: relative;
    overflow: hidden;
  }

  /* FUNDO COMO CAMADA SEPARADA (funciona melhor no GitHub) */
  .bg {
    position: fixed;
    inset: 0;
    background-image: url("wallpaper.png");
    background-size: cover;
    background-position: center;
    opacity: 0.20;
    z-index: 0;
  }

  .container {
    text-align: center;
    transform: translateY(-25px);
    position: relative;
    z-index: 1;
  }

  img {
    width: 1050px;
    max-width: 95vw;
    display: block;
    margin: 0 auto 22px;
  }

  .texto {
    letter-spacing: 2.5px;
    font-size: 35px;
    color: #ffffff; /* branco puro */
  }

  /* LOGO NO CANTO INFERIOR DIREITO */
  .logo {
    position: fixed;
    bottom: -10px;
    right: -5px;
    width: 250px;
    z-index: 2;
  }
</style>
</head>

<body>

  <!-- CAMADA DE FUNDO -->
  <div class="bg"></div>

  <div class="container">
    <img src="uv.png">
    <div class="texto">Não confie em ninguém.</div>
  </div>

  <!-- LOGO -->
  <img src="logo.png" class="logo" alt="logo">

</body>
</html>
